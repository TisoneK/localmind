<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalMind</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0f11;
    --surface:   #131619;
    --surface2:  #1a1e23;
    --border:    #232930;
    --border2:   #2e3640;
    --text:      #c8d0da;
    --text2:     #6b7785;
    --text3:     #3f4750;
    --accent:    #3dd68c;
    --accent2:   #1a6b42;
    --amber:     #f0a030;
    --blue:      #4a9eff;
    --red:       #e05555;
    --purple:    #a07aff;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
    --radius:    6px;
    --sidebar-w: 280px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); }

  /* ── Layout ─────────────────────────────────────────────── */
  #app { display: flex; height: 100vh; }

  /* ── Left sidebar — sessions ────────────────────────────── */
  #sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    transition: transform 0.2s ease;
  }

  .sidebar-header {
    padding: 20px 16px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 28px; height: 28px;
    background: var(--accent2);
    border: 1px solid var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 14px; height: 14px; stroke: var(--accent); fill: none; stroke-width: 1.5; }

  .logo-text { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: 0.03em; }
  .logo-version { font-family: var(--mono); font-size: 10px; color: var(--text3); }

  .new-chat-btn {
    margin: 12px;
    padding: 8px 12px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }
  .new-chat-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(61,214,140,0.05); }
  .new-chat-btn .plus { font-size: 16px; line-height: 1; }

  #session-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .session-item {
    padding: 8px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    margin-bottom: 2px;
    transition: background 0.1s;
    border: 1px solid transparent;
  }
  .session-item:hover { background: var(--surface2); }
  .session-item.active { background: var(--surface2); border-color: var(--border2); }

  .session-title {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .session-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    display: flex;
    gap: 8px;
  }

  .status-bar {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
  }
  .status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent2); }
  .status-dot.error { background: var(--red); }

  /* ── Main chat area ─────────────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    position: relative;
  }

  /* ── Top bar ────────────────────────────────────────────── */
  #topbar {
    height: 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    background: var(--surface);
  }

  .session-id-display {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    flex: 1;
  }

  .topbar-pills { display: flex; gap: 6px; align-items: center; }

  .pill {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 4px;
  }
  .pill:hover { border-color: var(--border2); color: var(--text2); }
  .pill.active { border-color: var(--accent2); color: var(--accent); background: rgba(61,214,140,0.08); }
  .pill.intent-web_search { border-color: #1a4a7a; color: var(--blue); background: rgba(74,158,255,0.07); }
  .pill.intent-code_exec  { border-color: #4a2060; color: var(--purple); background: rgba(160,122,255,0.07); }
  .pill.intent-memory_op  { border-color: #5a3a00; color: var(--amber); background: rgba(240,160,48,0.07); }
  .pill.intent-file_task  { border-color: #1a4a2a; color: var(--accent); background: rgba(61,214,140,0.07); }
  .pill.intent-file_write { border-color: #1a4a2a; color: var(--accent); background: rgba(61,214,140,0.07); }
  .pill.intent-chat       { border-color: var(--border2); color: var(--text3); }

  /* ── Messages ───────────────────────────────────────────── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .msg-row {
    display: flex;
    padding: 0 24px;
    margin-bottom: 20px;
    gap: 14px;
    animation: msg-in 0.2s ease;
  }
  /* B3: User messages right-aligned */
  .msg-row.role-user {
    flex-direction: row-reverse;
  }
  .msg-row.role-user .msg-body {
    align-items: flex-end;
    display: flex;
    flex-direction: column;
  }
  .msg-row.role-user .msg-meta {
    flex-direction: row-reverse;
  }
  .msg-row.role-user .msg-content {
    text-align: left;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    border-top-right-radius: 2px;
    padding: 10px 14px;
    max-width: 80%;
  }
  @keyframes msg-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 5px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    margin-top: 2px;
  }
  .msg-avatar.user { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); }
  .msg-avatar.assistant { background: var(--accent2); border: 1px solid var(--accent); color: var(--accent); }

  .msg-body { flex: 1; min-width: 0; }

  .msg-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .msg-role { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--text2); }
  .msg-time { font-family: var(--mono); font-size: 10px; color: var(--text3); }

  .msg-intent-badge {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid var(--border2);
    color: var(--text3);
  }

  .msg-content {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    word-break: break-word;
  }
  .msg-content p { margin-bottom: 10px; }
  .msg-content p:last-child { margin-bottom: 0; }
  .msg-content code {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--accent);
  }
  .msg-content pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    overflow-x: auto;
    margin: 10px 0;
    position: relative;
  }
  .msg-content pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--text);
    font-size: 12px;
    line-height: 1.6;
  }
  .msg-content blockquote {
    border-left: 2px solid var(--accent2);
    padding-left: 12px;
    color: var(--text2);
    margin: 8px 0;
  }
  .msg-content h1, .msg-content h2, .msg-content h3 {
    font-weight: 500;
    margin: 16px 0 8px;
    color: var(--text);
  }
  .msg-content h1 { font-size: 18px; }
  .msg-content h2 { font-size: 15px; }
  .msg-content h3 { font-size: 13px; font-family: var(--mono); color: var(--text2); }
  .msg-content ul, .msg-content ol { padding-left: 20px; margin: 8px 0; }
  .msg-content li { margin-bottom: 4px; }
  .msg-content table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
  .msg-content th { border-bottom: 1px solid var(--border2); padding: 6px 10px; text-align: left; font-weight: 500; color: var(--text2); font-family: var(--mono); font-size: 11px; }
  .msg-content td { padding: 6px 10px; border-bottom: 1px solid var(--border); }
  .msg-content a { color: var(--blue); text-decoration: none; }
  .msg-content a:hover { text-decoration: underline; }

  /* ── Tool result block ──────────────────────────────────── */
  .tool-block {
    margin: 10px 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    font-family: var(--mono);
  }
  .tool-block-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    color: var(--text3);
    cursor: pointer;
    user-select: none;
  }
  .tool-block-header:hover { color: var(--text2); }
  .tool-block-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--amber); }
  .tool-block-body { padding: 10px; font-size: 11px; color: var(--text2); line-height: 1.6; max-height: 200px; overflow-y: auto; }
  .tool-block.collapsed .tool-block-body { display: none; }

  /* F2: Streaming status line */
  .msg-status {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    font-style: italic;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    min-height: 18px;
  }
  .msg-status .spinner {
    width: 10px; height: 10px;
    border: 1.5px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Inline Status Indicator ───────────────────── */
  .msg-status {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    min-height: 18px;
    padding: 6px 8px;
    background: var(--surface1);
    border: 1px solid var(--border1);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .msg-status:hover {
    background: var(--surface2);
    border-color: var(--border2);
  }
  .msg-status .spinner {
    width: 10px; height: 10px;
    border: 1.5px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  .msg-status .status-text {
    flex: 1;
  }
  .msg-status .status-timer {
    font-size: 10px;
    color: var(--text3);
    margin-left: auto;
  }
  .msg-status .status-chevron {
    width: 12px; height: 12px;
    color: var(--text3);
    transition: transform 0.2s ease;
  }
  .msg-status.collapsed .status-chevron {
    transform: rotate(-90deg);
  }
  .msg-status .status-details {
    display: none;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border1);
    font-size: 10px;
  }
  .msg-status:not(.collapsed) .status-details {
    display: block;
  }

  /* ── Agent step trace ───────────────────────────────────── */
  .agent-trace {
    margin: 8px 0;
    font-family: var(--mono);
    font-size: 11px;
  }
  .agent-step {
    display: flex;
    gap: 8px;
    padding: 4px 0;
    color: var(--text3);
    border-left: 1px solid var(--border);
    padding-left: 10px;
    margin-left: 6px;
  }
  .agent-step-icon { color: var(--accent); flex-shrink: 0; }
  .agent-step.reflect .agent-step-icon { color: var(--amber); }
  .agent-step.fail .agent-step-icon { color: var(--red); }

  /* ── Memory chips ───────────────────────────────────────── */
  .memory-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin: 6px 0;
  }
  .memory-chip {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    background: rgba(240,160,48,0.08);
    border: 1px solid rgba(240,160,48,0.2);
    color: var(--amber);
    max-width: 220px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Empty state ────────────────────────────────────────── */
  #empty-state {
    position: absolute;
    inset: 48px 0 80px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
    pointer-events: none;
  }
  .empty-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    max-width: 480px;
    pointer-events: all;
  }
  .empty-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface);
  }
  .empty-card:hover { border-color: var(--border2); background: var(--surface2); }
  .empty-card-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .empty-card-text { font-size: 13px; color: var(--text2); }
  .empty-logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-align: center;
  }
  .empty-logo strong { color: var(--accent); font-weight: 500; }

  /* ── Input area ─────────────────────────────────────────── */
  #input-area {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-wrapper {
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--surface2);
    transition: border-color 0.15s;
    display: flex;
    flex-direction: column;
  }
  .input-wrapper:focus-within { border-color: var(--accent2); box-shadow: 0 0 0 2px rgba(61,214,140,0.08); }

  .file-preview {
    display: none;
    padding: 8px 12px 0;
    gap: 8px;
    align-items: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
  }
  .file-preview.visible { display: flex; }
  .file-preview-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-remove { cursor: pointer; color: var(--text3); transition: color 0.1s; padding: 0 4px; }
  .file-remove:hover { color: var(--red); }

  .msg-file {
    font-size: 11px;
    color: var(--accent);
    background: rgba(96, 165, 250, 0.1);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 4px 8px;
    margin-bottom: 6px;
    display: inline-block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .input-row { display: flex; align-items: flex-end; gap: 8px; padding: 8px 10px; }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    min-height: 22px;
    max-height: 160px;
    overflow-y: auto;
    scrollbar-width: thin;
  }
  #msg-input::placeholder { color: var(--text3); }

  .input-actions { display: flex; gap: 6px; align-items: center; }

  .icon-btn {
    width: 30px; height: 30px;
    background: none;
    border: 1px solid transparent;
    border-radius: 4px;
    cursor: pointer;
    color: var(--text3);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .icon-btn:hover { border-color: var(--border2); color: var(--text2); }
  .icon-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; }

  #send-btn {
    width: 30px; height: 30px;
    background: var(--accent2);
    border: 1px solid var(--accent);
    border-radius: 4px;
    cursor: pointer;
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #send-btn:hover { background: var(--accent); color: var(--bg); }
  #send-btn:disabled { opacity: 0.4; cursor: default; }
  #send-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

  .input-hint {
    display: flex;
    justify-content: space-between;
    padding: 0 12px 8px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }

  /* ── Right panel — observability ────────────────────────── */
  #obs-panel {
    width: 260px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.2s ease;
  }
  #obs-panel.collapsed { width: 0; border-left: none; }

  .obs-header {
    padding: 14px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text2);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .obs-header .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease-in-out infinite; }

  #obs-content {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .obs-event {
    padding: 6px 8px;
    border-radius: 4px;
    margin-bottom: 4px;
    background: var(--surface2);
    border-left: 2px solid var(--border2);
    animation: msg-in 0.15s ease;
  }
  .obs-event.intent { border-left-color: var(--blue); }
  .obs-event.tool { border-left-color: var(--purple); }
  .obs-event.memory { border-left-color: var(--amber); }
  .obs-event.complete { border-left-color: var(--accent); }
  .obs-event.error { border-left-color: var(--red); }

  .obs-event-name {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 3px;
    color: var(--text3);
  }
  .obs-event-body { color: var(--text2); line-height: 1.5; }
  .obs-kv { display: flex; gap: 4px; }
  .obs-key { color: var(--text3); flex-shrink: 0; }
  .obs-val { color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .obs-val.accent { color: var(--accent); }
  .obs-val.amber { color: var(--amber); }
  .obs-val.blue { color: var(--blue); }

  /* ── Hidden file input ───────────────────────────────────── */
  #file-input { display: none; }

  /* ── Scrollbar styling ───────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── Responsive ──────────────────────────────────────────── */
  @media (max-width: 900px) {
    #obs-panel { display: none; }
    #sidebar { width: 220px; }
  }
  @media (max-width: 600px) {
    #sidebar { position: absolute; z-index: 10; height: 100%; transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
  }

  /* ── Confirmation modal ──────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.visible { display: flex; }

<body>
<div id="app">

          <span class="file-preview-name" id="file-name"></span>

<script>
// ── State ─────────────────────────────────────────────────────────────────
const API = '';
let currentSessionId = null;
let sessions = [];
let streaming = false;
let streamReader = null;       // F9: hold reader ref for cancel
let pendingFileBytes = null;
let pendingFileName = null;
let pendingFilePath = null;  // full path when browser exposes it
let pendingFileSize = null;  // file size in bytes
let pendingFileType = null;  // file MIME type
let deleteTargetId = null;
let obsCollapsed = window.innerWidth < 900;
let msgHistory = [];           // F7: ↑ fill previous message

// Language extensions for code download
const _LANG_EXT = {
  "python": ".py", "py": ".py",
  "javascript": ".js", "js": ".js",
  "typescript": ".ts", "ts": ".ts",
  "bash": ".sh", "sh": ".sh", "shell": ".sh",
  "html": ".html", "css": ".css",
  "json": ".json", "yaml": ".yaml", "yml": ".yaml",
  "toml": ".toml", "sql": ".sql",
  "rust": ".rs", "go": ".go",
  "markdown": ".md", "md": ".md",
};

const STARTERS = [
  { label: 'web search', text: 'What are the latest developments in local LLMs?' },
  { label: 'memory', text: 'Remember that I prefer concise, direct answers' },
  { label: 'reasoning', text: 'Explain the difference between RAG and fine-tuning' },
  { label: 'file task', text: 'I have a CSV file I want to analyze' },
];

// ── Simple markdown renderer ───────────────────────────────────────────────
function renderMarkdown(text) {
  let h = text
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code class="lang-${lang}">${escHtml(code.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`)
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/\n\n+/g, '</p><p>')
    .replace(/\n/g, '<br>');
  return `<p>${h}</p>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatBytes(bytes) {
  if (bytes === 0) return '0 B';
  const k = 1024;
  const sizes = ['B', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

// ── Session management ────────────────────────────────────────────────────
function generateId() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
}

function newSession() {
  currentSessionId = generateId();
  clearMessages();
  document.getElementById('session-display').textContent = currentSessionId;
  updateSessionPills(null, null);
  resetTokenBar();
  renderSessionList();
  document.getElementById('msg-input').focus();
}

function clearMessages() {
  const msgs = document.getElementById('messages');
  msgs.querySelectorAll('.msg-row').forEach(e => e.remove());
  document.getElementById('empty-state').style.display = 'flex';
  clearObsPanel();
  msgHistory = [];
}

async function loadSessions() {
  try {
    const r = await fetch(`${API}/api/sessions`);
    sessions = await r.json();
    renderSessionList();
  } catch(e) {
    console.warn('Could not load sessions', e);
  }
}

function renderSessionList() {
  const list = document.getElementById('session-list');
  list.innerHTML = '';
  const allIds = sessions.map(s => s.id);
  if (currentSessionId && !allIds.includes(currentSessionId)) {
    list.appendChild(makeSessionItem({ id: currentSessionId, message_count: 0, last_active: Date.now()/1000 }));
  }
  sessions.forEach(s => list.appendChild(makeSessionItem(s)));
}

function makeSessionItem(s) {
  const item = document.createElement('div');
  item.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
  item.dataset.id = s.id;
  const lastActive = s.last_active ? new Date(s.last_active * 1000).toLocaleDateString() : '—';
  const count = s.message_count || 0;
  item.innerHTML = `
    <div class="session-title">${s.title || "New Chat"}</div>
    <div class="session-meta">
      <span>${count} msg${count !== 1 ? 's' : ''}</span>
      <span>${lastActive}</span>
    </div>`;
  item.addEventListener('click', () => loadSession(s.id));
  item.addEventListener('contextmenu', e => { e.preventDefault(); openDeleteModal(s.id); });
  return item;
}

async function loadSession(id) {
  if (id === currentSessionId) return;
  currentSessionId = id;
  document.getElementById('session-display').textContent = id;
  clearMessages();
  renderSessionList();
  try {
    const r = await fetch(`${API}/api/sessions/${id}/history`);
    if (!r.ok) return;
    const history = await r.json();
    document.getElementById('empty-state').style.display = 'none';
    history.forEach(msg => appendMessage(msg.role, msg.content, { 
  timestamp: msg.timestamp,
  file: msg.file_name ? {
    name: msg.file_name,
    path: msg.file_path,
    size: msg.file_size,
    type: msg.file_type
  } : null
}));
    scrollToBottom();
  } catch(e) { console.warn('Could not load history', e); }
}

// ── Delete modal ──────────────────────────────────────────────────────────
function openDeleteModal(id) {
  deleteTargetId = id;
  document.getElementById('delete-modal-body').textContent = `Delete session ${id}? This cannot be undone.`;
  document.getElementById('delete-modal').classList.add('visible');
}
function closeDeleteModal() {
  document.getElementById('delete-modal').classList.remove('visible');
  deleteTargetId = null;
}
async function confirmDelete() {
  if (!deleteTargetId) return;
  try {
    await fetch(`${API}/api/sessions/${deleteTargetId}`, { method: 'DELETE' });
    const wasCurrentSession = deleteTargetId === currentSessionId;
    
    // Reload sessions first to get updated list
    await loadSessions();
    
    if (wasCurrentSession) {
      // If we deleted the active session, switch to most recent remaining session
      if (sessions.length > 0) {
        const mostRecent = sessions[0];
        loadSession(mostRecent.id);
      } else {
        // No sessions left, create new one
        newSession();
      }
    }
  } catch(e) { console.warn(e); }
  closeDeleteModal();
}

// ── File handling ──────────────────────────────────────────────────────────
function handleFile(input) {
  const file = input.files ? input.files[0] : input;
  if (!file) return;
  pendingFileName = file.name;
  // Browsers expose webkitRelativePath or path in some Electron/desktop contexts
  pendingFilePath = file.path || file.webkitRelativePath || null;
  // Store file metadata for display
  pendingFileSize = file.size;
  pendingFileType = file.type || 'unknown';
  const reader = new FileReader();
  reader.onload = e => { pendingFileBytes = e.target.result; };
  reader.readAsArrayBuffer(file);
  const nameEl = document.getElementById('file-name');
  nameEl.textContent = pendingFilePath
    ? `${file.name}  —  ${pendingFilePath}`
    : file.name;
  nameEl.title = pendingFilePath || file.name;
  document.getElementById('file-preview').classList.add('visible');
}

function clearFile() {
  console.log('clearFile() called - clearing file preview');
  pendingFileBytes = null;
  pendingFileName = null;
  pendingFilePath = null;
  pendingFileSize = null;
  pendingFileType = null;
  document.getElementById('file-input').value = '';
  const previewEl = document.getElementById('file-preview');
  if (previewEl) {
    previewEl.classList.remove('visible');
    console.log('File preview cleared');
  } else {
    console.log('File preview element not found');
  }
}

// F6: Drag-and-drop
const messagesEl = document.getElementById ? null : null; // deferred below
function setupDragDrop() {
  const msgs = document.getElementById('messages');
  const overlay = document.getElementById('drop-overlay');
  msgs.addEventListener('dragover', e => {
    e.preventDefault();
    overlay.classList.add('visible');
  });
  msgs.addEventListener('dragleave', e => {
    if (!msgs.contains(e.relatedTarget)) overlay.classList.remove('visible');
  });
  msgs.addEventListener('drop', e => {
    e.preventDefault();
    overlay.classList.remove('visible');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });
}

// ── Send / Stop ───────────────────────────────────────────────────────────
function sendOrStop() {
  if (streaming) {
    // F9: Cancel stream
    if (streamReader) { streamReader.cancel(); streamReader = null; }
    setStreamingState(false);
  } else {
    sendMessage();
  }
}

function setStreamingState(active) {
  streaming = active;
  const btn = document.getElementById('send-btn');
  const sendIcon = document.getElementById('send-icon');
  const stopIcon = document.getElementById('stop-icon');
  if (active) {
    btn.classList.add('stop');
    btn.title = 'Stop (Esc)';
    sendIcon.style.display = 'none';
    stopIcon.style.display = '';
  } else {
    btn.classList.remove('stop');
    btn.title = 'Send (Enter)';
    sendIcon.style.display = '';
    stopIcon.style.display = 'none';
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

// F7: Keyboard shortcuts
document.addEventListener('keydown', e => {
  const input = document.getElementById('msg-input');
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); newSession(); }
  if ((e.ctrlKey || e.metaKey) && e.key === '/') { e.preventDefault(); toggleObsPanel(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
    e.preventDefault();
    document.getElementById('messages').querySelectorAll('.msg-row').forEach(r => r.remove());
    document.getElementById('empty-state').style.display = 'flex';
  }
  if (e.key === 'Escape' && streaming) {
    if (streamReader) { streamReader.cancel(); streamReader = null; }
    setStreamingState(false);
  }
  if (e.key === 'ArrowUp' && document.activeElement === input && !input.value) {
    if (msgHistory.length) { input.value = msgHistory[msgHistory.length - 1]; autoResize(input); }
  }
});

const toolStatusLabel = {
  web_search: 'Searching the web…',
  code_exec:  'Running code…',
  memory_op:  'Checking memory…',
  file_task:  'Reading file…',
  file_write: 'Writing file…',
};

async function sendMessage() {
  if (streaming) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  
  // Wait for file to finish loading if present
  if (pendingFileName && !pendingFileBytes) {
    // File is still loading, wait a bit
    await new Promise(resolve => setTimeout(resolve, 100));
    if (!pendingFileBytes) {
      alert('File still loading, please try again.');
      return;
    }
  }

  if (!currentSessionId) {
    currentSessionId = generateId();
    document.getElementById('session-display').textContent = currentSessionId;
  }

  msgHistory.push(text); // F7: store for ↑ recall
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('empty-state').style.display = 'none';
  setStreamingState(true);
  clearObsPanel();

  // Store file info for display before clearing
  const fileInfo = pendingFileName ? { 
    name: pendingFileName, 
    path: pendingFilePath,
    size: pendingFileSize,
    type: pendingFileType
  } : null;
  
  appendMessage('user', text, { file: fileInfo });

  const row = appendMessage('assistant', '', { streaming: true });
  const contentEl = row.querySelector('.msg-content');

  // F2: inline status with timer and collapse
  const statusEl = document.createElement('div');
  statusEl.className = 'msg-status';
  statusEl.innerHTML = `
    <div class="spinner"></div>
    <span class="status-text">Thinking…</span>
    <span class="status-timer">0s</span>
    <svg class="status-chevron" fill="currentColor" viewBox="0 0 20 20" style="width:12px;height:12px">
      <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/>
    </svg>
    <div class="status-details"></div>
  `;
  
  // Start timer
  const startTime = Date.now();
  const timerEl = statusEl.querySelector('.status-timer');
  const timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    timerEl.textContent = `${elapsed}s`;
  }, 1000);
  
  // Store timer interval for cleanup
  statusEl._timerInterval = timerInterval;
  
  // Add click handler for collapse/expand
  statusEl.addEventListener('click', () => {
    statusEl.classList.toggle('collapsed');
  });
  
  row.querySelector('.msg-body').appendChild(statusEl);

  const formData = new FormData();
  formData.append('message', text);
  formData.append('session_id', currentSessionId);

  if (pendingFileBytes && pendingFileName) {
    console.log('Uploading file:', pendingFileName, 'bytes:', pendingFileBytes.byteLength);
    // Try creating a File object instead of Blob for better FastAPI compatibility
    let fileObj;
    try {
      fileObj = new File([pendingFileBytes], pendingFileName, { type: 'application/octet-stream' });
      console.log('Created File object:', fileObj);
    } catch (e) {
      console.log('Failed to create File object, falling back to Blob:', e);
      fileObj = new Blob([pendingFileBytes], { type: 'application/octet-stream' });
    }
    formData.append('file', fileObj, pendingFileName);
    // Send original file path for in-place processing
    if (pendingFilePath) {
      formData.append('original_path', pendingFilePath);
      console.log('Added original_path:', pendingFilePath);
    }
    console.log('FormData entries after adding file:');
    for (let [key, value] of formData.entries()) {
      if (value instanceof File) {
        console.log('  ', key, value.name, value.size, 'bytes');
      } else if (value instanceof Blob) {
        console.log('  ', key, 'Blob', value.size, 'bytes');
      } else {
        console.log('  ', key, value);
      }
    }
  }

  try {
    const response = await fetch(`${API}/api/chat`, { 
      method: 'POST', 
      body: formData,
      // Don't set Content-Type header - browser will set it correctly for FormData
    });

    // Clear file after upload starts to prevent UI lag
    if (pendingFileBytes && pendingFileName) {
      clearFile();
    }

    if (!response.ok) {
      if (statusEl && statusEl._timerInterval) {
        clearInterval(statusEl._timerInterval);
      }
      statusEl?.remove();
      contentEl.innerHTML = `Error ${response.status}: ${await response.text()}`;
      // File clearing is now handled immediately after sending in sendMessage()
      return;
    }

    // F2: status line (now using the inline status)
    let rawText = '';
    let firstToken = false;
    let agentTrace = null;

    streamReader = response.body.getReader();
    const decoder = new TextDecoder();

    outer: while (true) {
      const { done, value } = await streamReader.read();
      if (done) break;
      const lines = decoder.decode(value).split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let data;
        try {
          data = JSON.parse(line.slice(6));
        } catch(parseError) {
          console.error('JSON parse error:', parseError);
          continue;
        }
        
        if (data.error) {
          contentEl.innerHTML = `<em style="color:var(--red)">Error: ${escHtml(data.error)}</em>`;
          if (statusEl && statusEl._timerInterval) {
            clearInterval(statusEl._timerInterval);
          }
          statusEl?.remove();
          break outer;
        }
          
          // F2: update status from obs events
          if (data.obs_event) {
            console.log('Received obs_event:', data.obs_event);
            addObsEvent(data.obs_event);
            const evt = data.obs_event;
            const textEl = statusEl?.querySelector('.status-text');
            const detailsEl = statusEl?.querySelector('.status-details');
            if (evt.type === 'tool_dispatched') {
              if (textEl) textEl.textContent = toolStatusLabel[evt.data?.tool] || 'Working…';
              if (detailsEl) detailsEl.textContent = `Tool: ${evt.data?.tool}`;
            } else if (evt.type === 'agent_loop_start') {
              if (textEl) textEl.textContent = 'Reasoning…';
              if (detailsEl) detailsEl.textContent = 'Agent loop started';
            } else if (evt.type === 'safety_blocked') {
              if (textEl) textEl.textContent = 'Blocked';
            }
            if (!firstToken) {
              // Update intent/confidence pills before first real content
              if (evt.type === 'intent_classified') {
                updateSessionPills(evt.data?.primary, evt.data?.confidence);
                // ── Fix: stop showing "Thinking…" the moment intent is known.
                // For CHAT fast-path, intent_classified fires before the LLM call,
                // so this prevents a 5–30s blank "Thinking…" wait on local models.
                const intentLabel = {
                  chat:       'Generating…',
                  web_search: 'Searching…',
                  code_exec:  'Running code…',
                  file_write: 'Writing file…',
                  file_task:  'Reading file…',
                  memory_op:  'Recalling…',
                  sysinfo:    'Checking system…',
                  shell:      'Running command…',
                }[evt.data?.primary] || 'Processing…';
                if (textEl) {
                  textEl.textContent = intentLabel;
                  textEl.style.color = 'var(--text2)';
                }
                if (detailsEl) detailsEl.textContent = evt.data?.primary || '';
              }
            }
            // Permission gate — render confirm/deny UI
            if (data.obs_event.type === 'permission_required') {
              const d = data.obs_event.data || {};
              if (statusEl && statusEl._timerInterval) clearInterval(statusEl._timerInterval);
              statusEl?.remove();
              firstToken = true;
              renderPermissionGate(row, d.pending_path, d.pending_content, d.filename);
            }
            if (data.obs_event.agent_trace) agentTrace = data.obs_event.agent_trace;
            if (data.obs_event.type === 'turn_complete') {
              const d = data.obs_event.data || {};
              if (d.tokens_approx) updateTokenBar(d.tokens_approx, 8192);
              if (d.model) updateModelPill(d.model);
            }
          }
          if (data.text) {
            // Filter out internal agent status lines completely from user content
            const isStatusLine = data.text.match(/^[\n\r]*_\[(?:Thinking|Using)[^\]]*\]_[\n\r]*$/);
            if (isStatusLine) {
              // Skip internal status lines entirely - don't add to content
              continue;
            }
            if (!firstToken) {
              firstToken = true;
              if (statusEl && statusEl._timerInterval) clearInterval(statusEl._timerInterval);
              // Transform status to show "Processing..." instead of removing
              const textEl = statusEl?.querySelector('.status-text');
              const detailsEl = statusEl?.querySelector('.status-details');
              if (textEl) {
                textEl.textContent = 'Processing...';
                textEl.style.color = 'var(--text2)';
              }
              if (detailsEl) detailsEl.textContent = 'Generating response';
            }
            rawText += data.text;
            contentEl.innerHTML = renderMarkdown(rawText);
            scrollToBottom();
          }
          if (data.intent) updateSessionPills(data.intent, data.confidence);
          if (data.memory_facts) showMemoryChips(row, data.memory_facts);
           if (data.done) {
             console.log('Response completed - checking file clearing logic');
             // 🔥 Refresh session list to update titles
             loadSessions();
             if (statusEl && statusEl._timerInterval) clearInterval(statusEl._timerInterval);
             // Transform status to completion summary instead of removing
             const textEl = statusEl?.querySelector('.status-text');
             const detailsEl = statusEl?.querySelector('.status-details');
             if (textEl) {
               const elapsed = Math.floor((Date.now() - startTime) / 1000);
               textEl.textContent = `Done (${elapsed}s)`;
               textEl.style.color = 'var(--accent)';
             }
             if (detailsEl) detailsEl.textContent = 'Complete';
             finalizeMessageTime(row);
             if (!rawText) {
               contentEl.innerHTML = '<em style="color:var(--text3)">⚠ No response — check Ollama is running.</em>';
             }
             if (agentTrace) renderAgentTrace(row, agentTrace);
             addMessageToolbar(row, rawText);
             // Render file links from tool metadata
             if (data.file_path) renderFileLink(row, data.file_path, data.file_name);
             // File clearing is now handled immediately after sending in sendMessage()
             await loadSessions();
             break outer;
           }
           }
       }
     streamReader = null;
   } catch(e) {
    if (e.name !== 'AbortError') {
      if (statusEl && statusEl._timerInterval) {
        clearInterval(statusEl._timerInterval);
      }
      statusEl?.remove();
      contentEl.innerHTML = `Connection error: ${e.message}`;
      // File clearing is now handled immediately after sending in sendMessage()
    }
  } finally {
    setStreamingState(false);
    streamReader = null;
    // Clean up status if still present
    if (statusEl && statusEl._timerInterval) {
      clearInterval(statusEl._timerInterval);
    }
    statusEl?.remove();
  }
}

// ── Message rendering ─────────────────────────────────────────────────────
function appendMessage(role, content, opts = {}) {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row role-${role}`;

  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${role}`;
  avatar.textContent = role === 'user' ? 'you' : 'lm';

  const body = document.createElement('div');
  body.className = 'msg-body';

  // User messages timestamp immediately; assistant timestamps on completion
  const ts = opts.timestamp ? new Date(opts.timestamp * 1000) : (role === 'user' ? new Date() : null);
  const timeStr = ts ? ts.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '…';

  // Add file display if present
  let fileDisplay = '';
  if (opts.file && opts.file.name) {
    let displayText = '';
    if (opts.file.path) {
      // Full path available - show path
      displayText = `${opts.file.name} - ${opts.file.path}`;
    } else if (opts.file.size && opts.file.type) {
      // No path available - show file size and type
      const sizeStr = formatBytes(opts.file.size);
      const typeStr = opts.file.type !== 'unknown' ? opts.file.type.split('/')[1] || opts.file.type : 'unknown type';
      displayText = `${opts.file.name} - ${sizeStr} (${typeStr})`;
    } else {
      // Fallback to just filename
      displayText = opts.file.name;
    }
    fileDisplay = `<div class="msg-file"> ${displayText}</div>`;
  }

  body.innerHTML = `
    <div class="msg-meta">
      <span class="msg-role">${role === 'user' ? 'you' : 'localmind'}</span>
      <span class="msg-time" data-pending="${role === 'assistant' && !opts.timestamp ? '1' : ''}">${timeStr}</span>
    </div>
    <div class="msg-content">${opts.streaming ? '' : renderMarkdown(content)}</div>
    ${fileDisplay}`;

  row.appendChild(avatar);
  row.appendChild(body);
  msgs.appendChild(row);

  if (!opts.streaming && content) addMessageToolbar(row, content);
  scrollToBottom();
  return row;
}

function finalizeMessageTime(row) {
  const timeEl = row.querySelector('.msg-time[data-pending="1"]');
  if (timeEl) {
    timeEl.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    timeEl.removeAttribute('data-pending');
  }
}

function showMemoryChips(row, facts) {
  if (!facts || !facts.length) return;
  const body = row.querySelector('.msg-body');
  const chips = document.createElement('div');
  chips.className = 'memory-chips';
  facts.slice(0, 4).forEach(f => {
    const chip = document.createElement('div');
    chip.className = 'memory-chip';
    chip.title = f;
    chip.textContent = f.length > 32 ? f.slice(0, 32) + '…' : f;
    chips.appendChild(chip);
  });
  body.insertBefore(chips, body.querySelector('.msg-content'));
}

// F3: Render agent trace block
function renderAgentTrace(row, trace) {
  if (!trace || !trace.steps || !trace.steps.length) return;
  const body = row.querySelector('.msg-body');
  const block = document.createElement('div');
  block.className = 'agent-trace-block';
  const n = trace.steps.length;
  block.innerHTML = `
    <div class="agent-trace-header" onclick="this.parentElement.classList.toggle('open')">
      <span class="agent-trace-toggle">▶</span>
      <span>Reasoning trace (${n} step${n !== 1 ? 's' : ''})</span>
    </div>
    <div class="agent-trace-body">${trace.steps.map(step => {
      const type = step.tool_name ? 'action' : (step.reflection ? 'reflect' : 'finish');
      const icon = type === 'action' ? '⚡' : type === 'reflect' ? '◎' : '✓';
      const label = step.tool_name
        ? `[${step.tool_name}] ${escHtml((step.tool_input || '').toString().slice(0, 60))}`
        : escHtml((step.reflection || step.thought || '').slice(0, 80));
      const result = step.observation ? `→ ${escHtml(step.observation.slice(0, 40))}` : '';
      return `<div class="trace-step ${type}">
        <span class="trace-step-icon">${icon}</span>
        <span class="trace-step-text">${label}</span>
        <span class="trace-step-result">${result}</span>
      </div>`;
    }).join('')}</div>`;
  body.appendChild(block);
}

// File link renderer — clickable link that opens file with default program
function renderFileLink(row, filePath, fileName) {
  if (!filePath) return;
  const body = row.querySelector('.msg-body');
  const linkEl = document.createElement('div');
  linkEl.className = 'file-result-link';
  const name = fileName || filePath.split(/[\\/]/).pop();
  linkEl.innerHTML = `
    <svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20">
      <path d="M4 4a2 2 0 012-2h4l6 6v8a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/>
    </svg>
    <a href="#" class="file-link-name" data-path="${escHtml(filePath)}" title="${escHtml(filePath)}">${escHtml(name)}</a>
    <span class="file-link-path">${escHtml(filePath)}</span>
  `;
  linkEl.querySelector('.file-link-name').addEventListener('click', async (e) => {
    e.preventDefault();
    try {
      await fetch(`${API}/api/open-file`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ path: filePath }),
      });
    } catch(err) { console.warn('open-file failed', err); }
  });
  body.appendChild(linkEl);
}

// Permission gate — renders confirm/deny buttons when file_writer needs user approval
function renderPermissionGate(row, pendingPath, pendingContent, filename) {
  const body = row.querySelector('.msg-body');
  const gate = document.createElement('div');
  gate.className = 'permission-gate';
  gate.innerHTML = `
    <div style="font-size:12px;color:var(--text2)">
      Allow LocalMind to write <strong>${escHtml(filename)}</strong>?<br>
      <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">${escHtml(pendingPath)}</span>
    </div>
    <div class="permission-gate-btns">
      <button class="perm-btn confirm" data-path="${escHtml(pendingPath)}" data-content="${escHtml(pendingContent)}">✓ Yes, write it</button>
      <button class="perm-btn deny">✕ No</button>
    </div>
  `;
  gate.querySelector('.perm-btn.confirm').addEventListener('click', async (e) => {
    const btn = e.currentTarget;
    btn.textContent = 'Writing…';
    btn.disabled = true;
    try {
      const r = await fetch(`${API}/api/confirm-write`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: btn.dataset.path, content: btn.dataset.content }),
      });
      const data = await r.json();
      gate.innerHTML = `<div style="font-size:12px;color:var(--accent)">✓ Written: <code>${escHtml(data.path)}</code></div>`;
      renderFileLink(row, data.path, data.filename);
    } catch(err) {
      gate.innerHTML = `<div style="color:var(--red);font-size:12px">Write failed: ${err.message}</div>`;
    }
  });
  gate.querySelector('.perm-btn.deny').addEventListener('click', () => {
    gate.innerHTML = `<div style="font-size:12px;color:var(--text3)">Write cancelled.</div>`;
  });
  body.appendChild(gate);
}

function addMessageToolbar(row, text) {
  const body = row.querySelector('.msg-body');
  const toolbar = document.createElement('div');
  toolbar.className = 'msg-actions';

  // Copy button
  const copyBtn = document.createElement('button');
  copyBtn.className = 'msg-action-btn';
  copyBtn.textContent = '📋 copy';
  copyBtn.onclick = () => {
    const plain = text.replace(/<[^>]*>/g, '');
    navigator.clipboard.writeText(plain).then(() => {
      copyBtn.textContent = '✓ copied';
      setTimeout(() => { copyBtn.textContent = '📋 copy'; }, 1500);
    });
  };

  // Download button — saves the message as .md or extracts code as file
  const dlBtn = document.createElement('button');
  dlBtn.className = 'msg-action-btn';
  dlBtn.textContent = '⬇ save';
  dlBtn.onclick = () => {
    const codeMatch = text.match(/```(\w+)?\n([\s\S]+?)\n```/);
    let blob, filename;
    if (codeMatch) {
      const lang = codeMatch[1] || 'txt';
      const extMap = {python:'py',javascript:'js',typescript:'ts',bash:'sh',html:'html',css:'css',json:'json'};
      filename = `localmind_code.${extMap[lang] || lang}`;
      blob = new Blob([codeMatch[2]], {type: 'text/plain'});
    } else {
      filename = 'localmind_response.md';
      blob = new Blob([text], {type: 'text/markdown'});
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  // Regenerate button
  const regenBtn = document.createElement('button');
  regenBtn.className = 'msg-action-btn';
  regenBtn.textContent = '↺ regen';
  regenBtn.onclick = () => {
    const rows = [...document.querySelectorAll('.msg-row')];
    const idx = rows.indexOf(row);
    if (idx > 0) {
      const prevUser = rows.slice(0, idx).reverse().find(r => r.classList.contains('role-user'));
      if (prevUser) {
        const content = prevUser.querySelector('.msg-content')?.textContent || '';
        if (content) { document.getElementById('msg-input').value = content; sendMessage(); }
      }
    }
  };

  // Thumb up button
  const thumbUpBtn = document.createElement('button');
  thumbUpBtn.className = 'msg-action-btn';
  thumbUpBtn.textContent = '👍';
  thumbUpBtn.onclick = () => {
    thumbUpBtn.classList.toggle('voted');
    thumbDownBtn.classList.remove('voted');
  };

  const thumbDownBtn = document.createElement('button');
  thumbDownBtn.className = 'msg-action-btn';
  thumbDownBtn.textContent = '👎';
  thumbDownBtn.onclick = () => {
    thumbDownBtn.classList.toggle('voted');
    thumbUpBtn.classList.remove('voted');
  };

  toolbar.append(copyBtn, dlBtn, regenBtn, thumbUpBtn, thumbDownBtn);
  body.appendChild(toolbar);
}


function updateSessionPills(intent, confidence) {
  const ip = document.getElementById('intent-pill');
  const cp = document.getElementById('confidence-pill');
  if (!intent) { ip.style.display = 'none'; cp.style.display = 'none'; return; }
  ip.style.display = 'flex';
  ip.className = `pill intent-${intent}`;
  ip.textContent = intent.replace('_', ' ');
  cp.style.display = 'flex';
  const pct = Math.round((confidence || 0) * 100);
  cp.textContent = `${pct}% conf`;
  cp.className = `pill ${pct >= 80 ? '' : pct >= 60 ? 'amber' : 'red'}`;
}

// F5: Token bar
function updateTokenBar(used, total) {
  const wrap = document.getElementById('token-bar-wrap');
  const fill = document.getElementById('token-bar-fill');
  const label = document.getElementById('token-label');
  const pct = Math.min(100, Math.round((used / total) * 100));
  fill.style.width = pct + '%';
  fill.style.background = pct > 80 ? 'var(--red)' : pct > 55 ? 'var(--amber)' : 'var(--accent)';
  label.textContent = `${used.toLocaleString()} / ${total.toLocaleString()}`;
  wrap.classList.add('visible');
}
function resetTokenBar() {
  document.getElementById('token-bar-wrap').classList.remove('visible');
  document.getElementById('token-bar-fill').style.width = '0%';
}

// F10: Model pill
function updateModelPill(model) {
  const pill = document.getElementById('model-pill');
  pill.textContent = model;
  pill.style.display = 'flex';
}

// ── Observability panel ───────────────────────────────────────────────────
function clearObsPanel() {
  document.getElementById('obs-content').innerHTML =
    '<div style="color:var(--text3);padding:8px 0;font-size:10px;">Events will appear here during processing.</div>';
}

const OBS_TYPE_MAP = {
  intent_classified: { cls: 'intent',   label: 'intent' },
  tool_scored:       { cls: 'tool',     label: 'tool scorer' },
  tool_dispatched:   { cls: 'tool',     label: 'tool dispatch' },
  tool_failed:       { cls: 'error',    label: 'tool error' },
  memory_retrieved:  { cls: 'memory',   label: 'memory' },
  memory_stored:     { cls: 'memory',   label: 'memory write' },
  agent_loop_start:  { cls: 'tool',     label: 'agent loop' },
  turn_complete:     { cls: 'complete', label: 'complete' },
};

function addObsEvent(event) {
  const panel = document.getElementById('obs-content');
  const firstChild = panel.querySelector('div[style]');
  if (firstChild) firstChild.remove();
  const meta = OBS_TYPE_MAP[event.type] || { cls: '', label: event.type };
  const el = document.createElement('div');
  el.className = `obs-event ${meta.cls}`;
  const kvLines = Object.entries(event.data || {}).map(([k, v]) => {
    let valClass = 'obs-val';
    if (k === 'primary' || k === 'intent' || k === 'top') valClass += ' accent';
    if (k === 'facts' || k === 'importance') valClass += ' amber';
    if (k === 'confidence' || k === 'score') valClass += ' blue';
    return `<div class="obs-kv"><span class="obs-key">${k}</span><span class="${valClass}">${escHtml(String(v))}</span></div>`;
  }).join('');
  el.innerHTML = `<div class="obs-event-name">${meta.label}</div><div class="obs-event-body">${kvLines}</div>`;
  panel.appendChild(el);
  panel.scrollTop = panel.scrollHeight;
}

function toggleObsPanel() {
  obsCollapsed = !obsCollapsed;
  document.getElementById('obs-panel').classList.toggle('collapsed', obsCollapsed);
  document.getElementById('obs-toggle').classList.toggle('active', !obsCollapsed);
}

// ── F4: Memory viewer ─────────────────────────────────────────────────────
let memoryPanelOpen = false;

function toggleMemoryPanel() {
  memoryPanelOpen = !memoryPanelOpen;
  document.getElementById('memory-panel').classList.toggle('visible', memoryPanelOpen);
  document.getElementById('memory-toggle').classList.toggle('active', memoryPanelOpen);
  if (memoryPanelOpen) loadMemory();
}

async function loadMemory() {
  const list = document.getElementById('memory-list');
  list.innerHTML = '<div class="memory-empty">Loading…</div>';
  try {
    const r = await fetch(`${API}/api/memory`);
    const data = await r.json();
    const facts = data.facts || [];
    if (!facts.length) { list.innerHTML = '<div class="memory-empty">No memories stored yet.</div>'; return; }
    list.innerHTML = '';
    facts.forEach(f => {
      const row = document.createElement('div');
      row.className = 'memory-fact-row';
      const ts = f.timestamp ? new Date(parseFloat(f.timestamp) * 1000).toLocaleDateString() : '—';
      const importance = f.importance ? Math.round(parseFloat(f.importance) * 100) + '%' : '—';
      const memType = f.memory_type || 'semantic';
      row.innerHTML = `
        <div class="memory-fact-text">${escHtml(f.fact || '')}</div>
        <div class="memory-fact-meta">
          <span class="memory-type-badge">${memType}</span>
          <span>importance ${importance}</span>
          <span>${ts}</span>
          <button class="memory-delete-btn" data-id="${escHtml(f.id || '')}" onclick="memoryDelete(this)">✕</button>
        </div>`;
      list.appendChild(row);
    });
  } catch(e) {
    list.innerHTML = `<div class="memory-empty">Error loading memory: ${e.message}</div>`;
  }
}

async function memoryDelete(btn) {
  const id = btn.dataset.id;
  if (!id) return;
  try {
    await fetch(`${API}/api/memory/${encodeURIComponent(id)}`, { method: 'DELETE' });
    btn.closest('.memory-fact-row').remove();
    if (!document.querySelector('.memory-fact-row')) {
      document.getElementById('memory-list').innerHTML = '<div class="memory-empty">No memories stored yet.</div>';
    }
  } catch(e) { alert('Delete failed: ' + e.message); }
}

async function memoryAdd() {
  const input = document.getElementById('memory-add-input');
  const fact = input.value.trim();
  if (!fact) return;
  input.value = '';
  try {
    await fetch(`${API}/api/memory`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fact, session_id: currentSessionId || 'manual' }),
    });
    await loadMemory();
  } catch(e) { alert('Store failed: ' + e.message); }
}

// ── F1: Ollama popover ────────────────────────────────────────────────────
let ollamaPopoverOpen = false;

function toggleOllamaPopover(e) {
  e.stopPropagation();
  ollamaPopoverOpen = !ollamaPopoverOpen;
  document.getElementById('ollama-popover').classList.toggle('visible', ollamaPopoverOpen);
  if (ollamaPopoverOpen) loadOllamaModels();
}

// Stop ALL clicks inside the popover from bubbling to document
document.getElementById('ollama-popover').addEventListener('click', e => e.stopPropagation());
document.getElementById('ollama-popover').addEventListener('mousedown', e => e.stopPropagation());

document.addEventListener('click', () => {
  if (ollamaPopoverOpen) {
    ollamaPopoverOpen = false;
    document.getElementById('ollama-popover').classList.remove('visible');
  }
});

async function loadOllamaModels() {
  try {
    const r = await fetch(`${API}/api/models`);
    const models = await r.json();
    const sel = document.getElementById('ollama-model-select');
    sel.innerHTML = models.length
      ? models.map(m => `<option value="${escHtml(m.name)}" ${m.active ? 'selected' : ''}>${escHtml(m.name)}${m.size_gb ? ' (' + m.size_gb + ' GB)' : ''}</option>`).join('')
      : '<option value="">No models installed</option>';
  } catch(e) {
    document.getElementById('ollama-model-select').innerHTML = '<option value="">Ollama offline</option>';
  }
}

async function ollamaStart(e) {
  e.stopPropagation();
  const btn = document.getElementById('ollama-start-btn');
  btn.disabled = true;
  btn.textContent = 'Starting…';
  try {
    const r = await fetch(`${API}/api/ollama/start`, { method: 'POST' });
    const data = await r.json();
    btn.textContent = data.message.slice(0, 30);
    await checkHealth();
    await loadOllamaModels();
  } catch(e) {
    btn.textContent = 'Failed — check terminal';
  } finally {
    setTimeout(() => { btn.disabled = false; btn.textContent = '▶ Start Ollama'; }, 3000);
  }
}

async function ollamaSelectModel(model) {
  if (!model) return;
  const sel = document.getElementById('ollama-model-select');
  const hint = document.getElementById('model-hint');
  const origText = hint.textContent;
  hint.textContent = 'Switching…';
  sel.disabled = true;
  try {
    const r = await fetch(`${API}/api/models/select`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({ detail: 'Unknown error' }));
      hint.textContent = `Error: ${err.detail || 'failed'}`;
      setTimeout(() => { hint.textContent = origText; }, 3000);
      return;
    }
    const data = await r.json();
    hint.textContent = `✓ ${data.selected}`;
    updateModelPill(data.selected);
    checkHealth();
    setTimeout(() => { hint.textContent = data.selected; }, 2000);
  } catch(e) {
    hint.textContent = 'Connection error';
    setTimeout(() => { hint.textContent = origText; }, 2000);
  } finally {
    sel.disabled = false;
  }
}

// Wire select change — must be done after DOM is ready
document.getElementById('ollama-model-select').addEventListener('change', function(e) {
  e.stopPropagation();
  ollamaSelectModel(this.value);
});

async function ollamaPull() {
  const input = document.getElementById('ollama-pull-input');
  const model = input.value.trim();
  if (!model) return;
  input.value = '';
  const log = document.getElementById('ollama-pull-log');
  log.textContent = `Pulling ${model}…\n`;
  try {
    const r = await fetch(`${API}/api/ollama/pull`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model }),
    });
    const reader = r.body.getReader();
    const dec = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      for (const line of dec.decode(value).split('\n')) {
        if (!line.startsWith('data: ')) continue;
        try {
          const d = JSON.parse(line.slice(6));
          if (d.text) { log.textContent += d.text + '\n'; log.scrollTop = log.scrollHeight; }
          if (d.done) {
            log.textContent += d.success ? '✓ Done\n' : `✗ ${d.error}\n`;
            if (d.success) loadOllamaModels();
          }
        } catch(_) {}
      }
    }
  } catch(e) { log.textContent += `Error: ${e.message}\n`; }
}

// ── Health check ──────────────────────────────────────────────────────────
async function checkHealth() {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  const hint = document.getElementById('model-hint');
  try {
    const r = await fetch(`${API}/api/health`);
    const data = await r.json();
    if (data.ollama_reachable) {
      dot.className = 'status-dot online';
      txt.textContent = data.model;
      hint.textContent = data.model;
      updateModelPill(data.model);
    } else {
      dot.className = 'status-dot error';
      txt.textContent = 'ollama offline';
    }
  } catch(e) {
    dot.className = 'status-dot error';
    txt.textContent = 'api unreachable';
  }
}

// ── Starters ──────────────────────────────────────────────────────────────
function renderStarters() {
  const grid = document.getElementById('starter-grid');
  STARTERS.forEach(s => {
    const card = document.createElement('div');
    card.className = 'empty-card';
    card.innerHTML = `<div class="empty-card-label">${s.label}</div><div class="empty-card-text">${s.text}</div>`;
    card.onclick = () => {
      document.getElementById('msg-input').value = s.text;
      autoResize(document.getElementById('msg-input'));
      sendMessage();
    };
    grid.appendChild(card);
  });
}

// ── Init ──────────────────────────────────────────────────────────────────
renderStarters();
checkHealth();
loadSessions().then(() => {
  // Resume the most recent session if available, otherwise create new
  if (sessions.length > 0) {
    const mostRecent = sessions[0];
    loadSession(mostRecent.id);
  } else {
    newSession();
  }
});
setupDragDrop();

setInterval(checkHealth, 30000);

document.getElementById('delete-modal').addEventListener('click', function(e) {
  if (e.target === this) closeDeleteModal();
});
